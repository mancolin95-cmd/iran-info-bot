name: Iran Info Bot Pro

on:
  schedule:
    - cron: "0 */2 * * *"   # 每2小时运行一次
  workflow_dispatch:          # 支持手动触发

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. 设置 Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. 安装依赖
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. 执行机器人脚本
      - name: Run Iran Info Bot
        env:
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}       # 企业微信机器人
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}   # DeepSeek API Key
        run: python main.py
